version: "3.9"

# Production compose using Traefik as the reverse proxy instead of Caddy.
# Prerequisites:
#   cp .env.example .env                 # set MQTT_USERNAME, MQTT_PASSWORD, DOMAIN, ACME_EMAIL
#   cp config.example.json config.json  # set broker credentials + channel keys
#   Edit traefik.yml and set your ACME email address.
#
# Start:   docker compose -f docker-compose.traefik.yml up -d
# Upgrade: docker compose -f docker-compose.traefik.yml pull && \
#          docker compose -f docker-compose.traefik.yml up -d

services:
  traefik:
    image: traefik:v3
    container_name: litescope-traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik-certs:/letsencrypt
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: litescope-mqtt
    entrypoint: ["/mosquitto/config/entrypoint.sh"]
    env_file: .env
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt-entrypoint.sh:/mosquitto/config/entrypoint.sh:ro
      - mqtt-data:/mosquitto/data
    restart: unless-stopped

  backend:
    image: ghcr.io/rikodev/litescope-backend:latest
    container_name: litescope-backend
    depends_on:
      - mosquitto
    volumes:
      - ./config.json:/app/config.json:ro
      - db-data:/app/data
    environment:
      - TZ=UTC
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Route /api/* and /ws to the backend — longer rule = higher priority than the frontend catch-all
      - "traefik.http.routers.litescope-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || Path(`/ws`))"
      - "traefik.http.routers.litescope-api.entrypoints=websecure"
      - "traefik.http.routers.litescope-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.litescope-api.loadbalancer.server.port=3000"

  frontend:
    image: ghcr.io/rikodev/litescope-frontend:latest
    container_name: litescope-frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Catch-all: every other request goes to the frontend nginx
      - "traefik.http.routers.litescope-ui.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.litescope-ui.entrypoints=websecure"
      - "traefik.http.routers.litescope-ui.tls.certresolver=letsencrypt"
      - "traefik.http.services.litescope-ui.loadbalancer.server.port=80"

volumes:
  mqtt-data:
  db-data:
  traefik-certs:
