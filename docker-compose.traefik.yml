version: "3.9"

# Production compose for an existing Traefik setup (external traefik_gateway network).
# Prerequisites:
#   cp config.example.json config.json
#   cp .env.example .env   # set MQTT_USERNAME, MQTT_PASSWORD, DOMAIN
#
# Start:   docker compose -f docker-compose.traefik.yml up -d
# Upgrade: docker compose -f docker-compose.traefik.yml pull && \
#          docker compose -f docker-compose.traefik.yml up -d

networks:
  traefik-proxy:
    name: traefik_gateway
    external: true
  internal:
    internal: true
  mqtt-external:
    driver: bridge

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: litescope-mqtt
    cpus: 0.50
    mem_limit: 128m
    env_file: .env
    command: >
      sh -c "mkdir -p /mosquitto/config &&
      rm -f /mosquitto/config/passwd &&
      mosquitto_passwd -c -b /mosquitto/config/passwd $$MQTT_USERNAME $$MQTT_PASSWORD &&
      chmod 0640 /mosquitto/config/passwd &&
      chown mosquitto:mosquitto /mosquitto/config/passwd &&
      printf 'listener 1883\nallow_anonymous false\npassword_file /mosquitto/config/passwd\npersistence true\npersistence_location /mosquitto/data/\nlog_dest stdout\n'
      > /mosquitto/config/mosquitto.conf && mosquitto -c /mosquitto/config/mosquitto.conf"
    ports:
      - "1883:1883"
    networks:
      - internal
      - mqtt-external
    volumes:
      - mqtt-data:/mosquitto/data
    restart: unless-stopped

  backend:
    image: ghcr.io/rikodev/litescope-backend:dev
    container_name: litescope-backend
    cpus: 2.00
    mem_limit: 2g
    depends_on:
      - mosquitto
    networks:
      - internal
      - traefik-proxy
    volumes:
      - ./config.json:/app/config.json:ro
      - db-data:/app/data
    environment:
      - TZ=UTC
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_gateway"
      - "traefik.http.routers.litescope-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || Path(`/ws`))"
      - "traefik.http.routers.litescope-api.service=litescope-api"
      - "traefik.http.routers.litescope-api.tls=true"
      - "traefik.http.services.litescope-api.loadBalancer.server.port=3000"

  frontend:
    image: ghcr.io/rikodev/litescope-frontend:dev
    container_name: litescope-frontend
    cpus: 0.50
    mem_limit: 128m
    env_file: .env
    networks:
      - traefik-proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_gateway"
      - "traefik.http.routers.litescope-ui.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.litescope-ui.service=litescope-ui"
      - "traefik.http.routers.litescope-ui.tls=true"
      - "traefik.http.services.litescope-ui.loadBalancer.server.port=80"
      - "traefik.http.services.litescope-ui.loadBalancer.healthcheck.path=/"
      - "traefik.http.services.litescope-ui.loadBalancer.healthcheck.interval=10s"
      - "traefik.http.services.litescope-ui.loadBalancer.healthcheck.scheme=http"

volumes:
  mqtt-data:
  db-data:
