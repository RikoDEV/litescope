version: "3.9"

# Production compose using pre-built images from ghcr.io.
# Prerequisites:
#   cp .env.example .env          # set MQTT_USERNAME / MQTT_PASSWORD
#   cp config.example.json config.json   # set broker credentials + channel keys
#
# Start:   docker compose -f docker-compose.full.yml up -d
# Upgrade: docker compose -f docker-compose.full.yml pull && \
#          docker compose -f docker-compose.full.yml up -d

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: litescope-mqtt
    entrypoint: ["/mosquitto/config/entrypoint.sh"]
    env_file: .env
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mqtt-entrypoint.sh:/mosquitto/config/entrypoint.sh:ro
      - mqtt-data:/mosquitto/data
    restart: unless-stopped

  backend:
    image: ghcr.io/rikodev/litescope-backend:latest
    container_name: litescope-backend
    depends_on:
      - mosquitto
    volumes:
      - ./config.json:/app/config.json:ro
      - db-data:/app/data
    environment:
      - TZ=UTC
    restart: unless-stopped
    expose:
      - "3000"

  frontend:
    image: ghcr.io/rikodev/litescope-frontend:latest
    container_name: litescope-frontend
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: litescope-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.full:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  mqtt-data:
  db-data:
  caddy-data:
