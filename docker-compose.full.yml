version: "3.9"

# Production compose using pre-built images from ghcr.io.
# Prerequisites:
#   cp config.example.json config.json
#   cp .env.example .env   # set MQTT_USERNAME, MQTT_PASSWORD
#
# Start:   docker compose -f docker-compose.full.yml up -d
# Upgrade: docker compose -f docker-compose.full.yml pull && \
#          docker compose -f docker-compose.full.yml up -d

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: litescope-mqtt
    env_file: .env
    command: >
      sh -c "mkdir -p /mosquitto/config &&
      rm -f /mosquitto/config/passwd &&
      mosquitto_passwd -c -b /mosquitto/config/passwd $$MQTT_USERNAME $$MQTT_PASSWORD &&
      chmod 0640 /mosquitto/config/passwd &&
      chown mosquitto:mosquitto /mosquitto/config/passwd &&
      printf 'listener 1883\nallow_anonymous false\npassword_file /mosquitto/config/passwd\npersistence true\npersistence_location /mosquitto/data/\nlog_dest stdout\n'
      > /mosquitto/config/mosquitto.conf && mosquitto -c /mosquitto/config/mosquitto.conf"
    ports:
      - "1883:1883"
    volumes:
      - mqtt-data:/mosquitto/data
    restart: unless-stopped

  backend:
    image: ghcr.io/rikodev/litescope-backend:latest
    container_name: litescope-backend
    depends_on:
      - mosquitto
    volumes:
      - ./config.json:/app/config.json:ro
      - db-data:/app/data
    environment:
      - TZ=UTC
    restart: unless-stopped
    expose:
      - "3000"

  frontend:
    image: ghcr.io/rikodev/litescope-frontend:latest
    container_name: litescope-frontend
    env_file: .env
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: litescope-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.full:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  mqtt-data:
  db-data:
  caddy-data:
