<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1625"/>
      <stop offset="1" stop-color="#12101C"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B6CFF"/>
      <stop offset="0.52" stop-color="#A98BF2"/>
      <stop offset="1" stop-color="#EFB8C8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#7C5CFC" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7C5CFC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#EFB8C8" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#EFB8C8" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="icon-clip">
      <rect width="120" height="120" rx="30"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#7C5CFC" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Glow blobs -->
  <ellipse cx="240" cy="315" rx="320" ry="280" fill="url(#glow1)"/>
  <ellipse cx="960" cy="315" rx="260" ry="240" fill="url(#glow2)"/>

  <!-- Mesh network illustration (right side) -->
  <g opacity="0.18" stroke="#A98BF2" stroke-width="1.5" stroke-linecap="round">
    <line x1="820" y1="180" x2="960" y2="240"/>
    <line x1="960" y1="240" x2="1080" y2="180"/>
    <line x1="960" y1="240" x2="940" y2="380"/>
    <line x1="940" y1="380" x2="820" y2="420"/>
    <line x1="940" y1="380" x2="1060" y2="440"/>
    <line x1="820" y1="180" x2="820" y2="420"/>
    <line x1="1080" y1="180" x2="1060" y2="440"/>
    <line x1="820" y1="420" x2="1060" y2="440"/>
    <line x1="820" y1="180" x2="940" y2="380"/>
  </g>
  <g opacity="0.22" fill="#A98BF2">
    <circle cx="820" cy="180" r="6"/>
    <circle cx="960" cy="240" r="8"/>
    <circle cx="1080" cy="180" r="5"/>
    <circle cx="940" cy="380" r="9"/>
    <circle cx="820" cy="420" r="6"/>
    <circle cx="1060" cy="440" r="5"/>
  </g>
  <!-- Origin node ripples -->
  <g fill="none" stroke="#EFB8C8" stroke-linecap="round">
    <circle cx="960" cy="240" r="18" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle cx="960" cy="240" r="30" stroke-opacity="0.10" stroke-width="1.5"/>
    <circle cx="960" cy="240" r="44" stroke-opacity="0.06" stroke-width="1.5"/>
  </g>

  <!-- App icon -->
  <g transform="translate(140, 225)" filter="url(#shadow)">
    <g clip-path="url(#icon-clip)">
      <rect width="120" height="120" fill="url(#icon-bg)"/>
      <!-- icon content scaled from 64→120 (×1.875) -->
      <g transform="scale(1.875)">
        <g fill="none" stroke="#FFFFFF" stroke-linecap="round">
          <circle cx="23" cy="41" r="11" stroke-opacity="0.55" stroke-width="2"/>
          <circle cx="23" cy="41" r="19" stroke-opacity="0.30" stroke-width="2"/>
          <circle cx="23" cy="41" r="27" stroke-opacity="0.15" stroke-width="2"/>
        </g>
        <g stroke="#FFFFFF" stroke-opacity="0.78" stroke-width="1.8" stroke-linecap="round">
          <line x1="23" y1="41" x2="43" y2="22"/>
          <line x1="23" y1="41" x2="47" y2="43"/>
          <line x1="43" y1="22" x2="47" y2="43"/>
          <line x1="47" y1="43" x2="34" y2="53"/>
        </g>
        <g fill="#FFFFFF">
          <circle cx="43" cy="22" r="3.3"/>
          <circle cx="47" cy="43" r="3.3"/>
          <circle cx="34" cy="53" r="3.3"/>
        </g>
        <circle cx="23" cy="41" r="6" fill="#FFFFFF"/>
        <circle cx="23" cy="41" r="2.9" fill="#F0588F"/>
      </g>
    </g>
  </g>

  <!-- liteScope wordmark -->
  <text x="290" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="700" letter-spacing="-3" fill="#FFFFFF">liteScope</text>

  <!-- Tagline -->
  <text x="292" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="400" letter-spacing="0.5" fill="#A98BF2">MeshCore Network Monitor</text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">
    <!-- pill 1 -->
    <rect x="292" y="418" width="150" height="36" rx="18" fill="#8B6CFF" fill-opacity="0.2" stroke="#8B6CFF" stroke-opacity="0.5" stroke-width="1"/>
    <text x="367" y="441" text-anchor="middle" fill="#C4B5FD">Live packets</text>
    <!-- pill 2 -->
    <rect x="458" y="418" width="122" height="36" rx="18" fill="#8B6CFF" fill-opacity="0.2" stroke="#8B6CFF" stroke-opacity="0.5" stroke-width="1"/>
    <text x="519" y="441" text-anchor="middle" fill="#C4B5FD">Node map</text>
    <!-- pill 3 -->
    <rect x="596" y="418" width="148" height="36" rx="18" fill="#8B6CFF" fill-opacity="0.2" stroke="#8B6CFF" stroke-opacity="0.5" stroke-width="1"/>
    <text x="670" y="441" text-anchor="middle" fill="#C4B5FD">RF analytics</text>
    <!-- pill 4 -->
    <rect x="760" y="418" width="96" height="36" rx="18" fill="#8B6CFF" fill-opacity="0.2" stroke="#8B6CFF" stroke-opacity="0.5" stroke-width="1"/>
    <text x="808" y="441" text-anchor="middle" fill="#C4B5FD">Free</text>
  </g>

  <!-- Bottom attribution -->
  <text x="292" y="548" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#6B5E8A">riko.dev · github.com/RikoDEV/litescope</text>

  <!-- Bottom bar accent -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#icon-bg)" opacity="0.6"/>
</svg>
