<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- brand gradient: violet -> lavender -> tertiary pink -->
    <linearGradient id="ls-bg" x1="6" y1="2" x2="58" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B6CFF"/>
      <stop offset="0.52" stop-color="#A98BF2"/>
      <stop offset="1" stop-color="#EFB8C8"/>
    </linearGradient>
    <!-- soft top-left sheen -->
    <radialGradient id="ls-glow" cx="0" cy="0" r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(18 14) rotate(50) scale(50)">
      <stop stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- origin-node soft halo -->
    <radialGradient id="ls-node-halo" cx="0" cy="0" r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(23 41) scale(13)">
      <stop stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ls-clip">
      <rect width="64" height="64" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#ls-clip)">
    <!-- background -->
    <rect width="64" height="64" rx="16" fill="url(#ls-bg)"/>
    <rect width="64" height="64" fill="url(#ls-glow)"/>

    <!-- signal ripples radiating from the origin node -->
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round">
      <circle cx="23" cy="41" r="11" stroke-opacity="0.55" stroke-width="2"/>
      <circle cx="23" cy="41" r="19" stroke-opacity="0.30" stroke-width="2"/>
      <circle cx="23" cy="41" r="27" stroke-opacity="0.15" stroke-width="2"/>
    </g>

    <!-- mesh edges -->
    <g stroke="#FFFFFF" stroke-opacity="0.78" stroke-width="1.8" stroke-linecap="round">
      <line x1="23" y1="41" x2="43" y2="22"/>
      <line x1="23" y1="41" x2="47" y2="43"/>
      <line x1="43" y1="22" x2="47" y2="43"/>
      <line x1="47" y1="43" x2="34" y2="53"/>
    </g>

    <!-- satellite mesh nodes -->
    <g fill="#FFFFFF">
      <circle cx="43" cy="22" r="3.3"/>
      <circle cx="47" cy="43" r="3.3"/>
      <circle cx="34" cy="53" r="3.3"/>
    </g>

    <!-- origin node: halo + bright disc + pink core -->
    <circle cx="23" cy="41" r="12" fill="url(#ls-node-halo)"/>
    <circle cx="23" cy="41" r="6" fill="#FFFFFF"/>
    <circle cx="23" cy="41" r="2.9" fill="#F0588F"/>
  </g>
</svg>
