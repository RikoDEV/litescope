name: Backend

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  build:
    name: Vet & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v7
        with:
          go-version-file: backend/go.mod

      - name: Tidy (generates go.sum if missing)
        working-directory: backend
        run: go mod tidy

      - name: Vet
        working-directory: backend
        run: go vet ./...

      - name: Test
        working-directory: backend
        run: go test ./...

      - name: Build ingestor
        working-directory: backend
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /tmp/ingestor ./cmd/ingestor

      - name: Build server
        working-directory: backend
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o /tmp/server ./cmd/server
